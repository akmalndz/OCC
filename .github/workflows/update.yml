name: Update Dashboard

on:
  schedule:
    # ── Morning window: 8:55–10:25 AM CT (7 runs, every 15 min) ────────────────
    # CT = CDT (UTC-5) during daylight saving (Mar–Nov)
    - cron: '55 13 * * 1-5'   # 08:55 CT
    - cron: '10 14 * * 1-5'   # 09:10 CT
    - cron: '25 14 * * 1-5'   # 09:25 CT
    - cron: '40 14 * * 1-5'   # 09:40 CT
    - cron: '55 14 * * 1-5'   # 09:55 CT
    - cron: '10 15 * * 1-5'   # 10:10 CT
    - cron: '25 15 * * 1-5'   # 10:25 CT
    # ── Midday / afternoon checks ───────────────────────────────────────────────
    - cron: '0 16 * * 1-5'    # 11:00 CT
    - cron: '0 18 * * 1-5'    # 13:00 CT (1 PM)
    - cron: '0 19 * * 1-5'    # 14:00 CT (2 PM)
    - cron: '0 20 * * 1-5'    # 15:00 CT (3 PM)
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install deps
        run: pip install -q -r requirements.txt

      - name: Run updater
        run: |
          for i in 1 2; do
            python update_dashboard.py && break
            [ $i -lt 2 ] && sleep 15
          done

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && exit 0
          git commit -m "upd $(date -u +%H:%M)"
          git push
