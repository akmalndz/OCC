name: Update SPY Dashboard

on:
  schedule:
    # 9:00–10:30 AM CT (CDT = UTC-5), every 15 min, weekdays only
    - cron: '0 14 * * 1-5'    # 09:00 CT
    - cron: '15 14 * * 1-5'   # 09:15 CT
    - cron: '30 14 * * 1-5'   # 09:30 CT
    - cron: '45 14 * * 1-5'   # 09:45 CT
    - cron: '0 15 * * 1-5'    # 10:00 CT
    - cron: '15 15 * * 1-5'   # 10:15 CT
    - cron: '30 15 * * 1-5'   # 10:30 CT
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install deps
        run: pip install -q -r requirements.txt

      - name: Run updater
        run: |
          python update_dashboard.py || python update_dashboard.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && exit 0
          git commit -m "upd $(date -u +%H:%M)"
          git push
