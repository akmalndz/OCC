name: Update SPY Dashboard

on:
  schedule:
    # Pre-market scan (8:55 AM CT = 13:55 UTC)
    - cron: '55 13 * * 1-5'
    # ORB window — every 5 min (9:45–10:30 AM CT = 14:45–15:30 UTC)
    - cron: '45 14 * * 1-5'
    - cron: '50 14 * * 1-5'
    - cron: '55 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '5 15 * * 1-5'
    - cron: '10 15 * * 1-5'
    - cron: '15 15 * * 1-5'
    - cron: '20 15 * * 1-5'
    - cron: '25 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    # Post-cutoff (10:35 AM CT = 15:35 UTC) — final state
    - cron: '35 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install yfinance feedparser numpy pytz

      - name: Run updater
        run: |
          for i in 1 2 3; do
            echo "Attempt $i"
            python update_dashboard.py && exit 0
            sleep 30
          done
          exit 1

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "spy update $(date -u +%H:%M)"
          git push
