// ─── MATH ─────────────────────────────────────────────────────────────────────
function ema(a,p){const k=2/(p+1);let e=a[0];return a.map(v=>{e=v*k+e*(1-k);return e;});}
function rsiV(a,p=14){
  if(a.length<p+1)return 50;
  let g=0,l=0;
  for(let i=1;i<=p;i++){const d=a[i]-a[i-1];d>0?g+=d:l-=d;}
  let ag=g/p,al=l/p;
  for(let i=p+1;i<a.length;i++){const d=a[i]-a[i-1];ag=(ag*(p-1)+Math.max(d,0))/p;al=(al*(p-1)+Math.max(-d,0))/p;}
  return al===0?100:+(100-100/(1+ag/al)).toFixed(1);
}
function macdC(a){
  const line=ema(a,12).map((v,i)=>v-ema(a,26)[i]);
  const s=ema(line,9);
  const h=line[line.length-1]-s[s.length-1];
  const pv=line[line.length-2]-s[s.length-2];
  return{hist:+h.toFixed(4),prev:+pv.toFixed(4),cross:h>0&&pv<=0};
}
function kamaC(a,p=10,f=2,sl=30){
  const fsc=2/(f+1),ssc=2/(sl+1);let k=a[0];const o=[k];
  for(let i=1;i<a.length;i++){
    if(i<p){o.push(k);continue;}
    const dir=Math.abs(a[i]-a[i-p]);
    const vol=a.slice(i-p,i).reduce((s,v,j,ar)=>j===0?s:s+Math.abs(v-ar[j-1]),0);
    const er=vol===0?0:dir/vol;
    k=k+Math.pow(er*(fsc-ssc)+ssc,2)*(a[i]-k);o.push(k);
  }
  return o;
}
function vwapC(cs){let pv=0,v=0;return cs.map(c=>{const h=(c.h+c.l+c.c)/3;pv+=h*c.v;v+=c.v;return pv/v;});}
function erC(a,p=20){
  if(a.length<p+1)return 0.5;
  const dir=Math.abs(a[a.length-1]-a[a.length-1-p]);
  const noise=a.slice(-p-1).reduce((s,v,i,ar)=>i===0?s:s+Math.abs(v-ar[i-1]),0);
  return noise===0?0:+Math.min(dir/noise,1).toFixed(3);
}
function atrC(cs,p=14){
  if(cs.length<2)return 0;
  const trs=cs.slice(1).map((c,i)=>Math.max(c.h-c.l,Math.abs(c.h-cs[i].c),Math.abs(c.l-cs[i].c)));
  return+(trs.slice(-p).reduce((a,v)=>a+v,0)/p).toFixed(3);
}
function adxC(cs,p=14){
  if(cs.length<p+2)return 20;
  let pDM=0,mDM=0,tr=0;
  for(let i=1;i<=p;i++){
    const c=cs[cs.length-p+i-1],pv=cs[cs.length-p+i-2];
    const up=c.h-pv.h,dn=pv.l-c.l;
    pDM+=up>dn&&up>0?up:0;mDM+=dn>up&&dn>0?dn:0;
    tr+=Math.max(c.h-c.l,Math.abs(c.h-pv.c),Math.abs(c.l-pv.c));
  }
  if(tr===0)return 20;
  const dp=(pDM/tr)*100,dm=(mDM/tr)*100;
  return+((Math.abs(dp-dm)/(dp+dm||1))*100).toFixed(1);
}
function rvolC(cs){
  const r=cs.slice(-5).reduce((s,c)=>s+c.v,0)/5;
  const b=cs.slice(-30,-5).reduce((s,c)=>s+c.v,0)/25;
  return b>0?+(r/b).toFixed(2):1;
}
function genC(n=120,base=BASE,drift=0){
  let p=base-0.5;const o=[];
  const t0=new Date();t0.setHours(9,30,0,0);
  for(let i=0;i<n;i++){
    const chg=(Math.random()-0.492+drift)*0.25,rng=0.08+Math.random()*0.26;
    const op=p,cl=op+chg;
    o.push({t:new Date(t0.getTime()+i*60000),o:op,h:Math.max(op,cl)+rng*0.45,l:Math.min(op,cl)-rng*0.45,c:cl,v:350000+Math.random()*900000});
    p=cl;
  }
  return o;
}
function resamp(c,m){
  const o=[];
  for(let i=0;i<c.length;i+=m){
    const s=c.slice(i,i+m);if(!s.length)continue;
    o.push({t:s[0].t,o:s[0].o,h:Math.max(...s.map(x=>x.h)),l:Math.min(...s.map(x=>x.l)),c:s[s.length-1].c,v:s.reduce((a,x)=>a+x.v,0)});
  }
  return o;
}
function ind(cs){
  const cl=cs.map(c=>c.c),ks=kamaC(cl),vw=vwapC(cs);
  const r=rsiV(cl),mc=macdC(cl);
  const last=cs[cs.length-1],hlc3=(last.h+last.l+last.c)/3;
  const p=cl[cl.length-1],kn=ks[ks.length-1],vn=vw[vw.length-1];
  const bK=hlc3>kn,bV=p>vn,bR=r>50,bM=mc.hist>0;
  const atr=atrC(cs),adx=adxC(cs),rvol=rvolC(cs),bVol=rvol>=1.0;
  return{r,mc,hlc3,p,kn,vn,bK,bV,bR,bM,bVol,atr,adx,rvol,score:[bK,bV,bR,bM].filter(Boolean).length};
}
function genFlow(price){
  const strikes=Array.from({length:9},(_,i)=>Math.round(price-4+i));
  return Array.from({length:5},(_,i)=>{
    const cp=i%2===0?"CALL":"PUT",K=strikes[i+1];

  });
}
function genChain(spot){
  return[-3,-2,-1,0,1,2,3].map(d=>{
    const K=Math.round(spot+d),m=(spot-K)/spot;
    const delta=Math.max(0.05,Math.min(0.95,0.5+m*9));
    const callPx=Math.max(0.05,((spot-K)*Math.max(delta-0.5,0)+0.7+Math.random()*0.6)).toFixed(2);
    const putPx=Math.max(0.05,((K-spot)*Math.max(0.5-delta,0)+0.7+Math.random()*0.6)).toFixed(2);
    const cVol=Math.floor(2000+Math.random()*25000),pVol=Math.floor(2000+Math.random()*25000);
    const cOI=Math.floor(8000+Math.random()*60000),pOI=Math.floor(8000+Math.random()*60000);
    const spread=+(Math.random()*0.08+0.01).toFixed(2);
    const iv=+(0.15+Math.random()*0.08+Math.abs(m)*0.6).toFixed(3);
    return{K,callPx,putPx,delta:delta.toFixed(2),cVol,pVol,cOI,pOI,spread,iv,itm:K<spot};
  });
}

// ─── MAIN STATE ───────────────────────────────────────────────────────────────
const c1m  = genC(120,BASE,-0.0005);
const flow = genFlow(BASE);
const vix  = +(18+Math.random()*12).toFixed(1);

function compute(){
  const c3m=resamp(c1m,3),c5m=resamp(c1m,5),c15m=resamp(c1m,15),c30m=resamp(c1m,30),c1h=resamp(c1m,60);

  const wt=i1h.score*2+i30m.score*1.5+i15m.score+i5m.score+i3m.score*1.5+i1m.score;
  const wtMax=4*(2+1.5+1+1+1.5+1);
  const bullPct=wt/wtMax;
  const sig=bullPct>0.58?"CALL":bullPct<0.42?"PUT":"WAIT";
  const sigC=sig==="CALL"?U:sig==="PUT"?D:A;
  const passingTFs=[i1h,i30m,i15m,i5m,i3m,i1m].filter(i=>i.score>=3).length;
  const gates=[
    {id:"G1",name:"KAMA",   pass:i3m.bK&&i1m.bK},
    {id:"G2",name:"RSI>50", pass:i3m.bR&&i1m.bR},
    {id:"G3",name:"MACD",   pass:i3m.bM},
    {id:"G4",name:"VWAP",   pass:i3m.bV&&i1m.bV},
    {id:"G5",name:"RVOL",   pass:i5m.bVol},
    {id:"G6",name:"ADX",    pass:i5m.adx>=20},
  ];
  const passGates=gates.filter(g=>g.pass).length;
  const er5=erC(c5m.map(c=>c.c));
  const entryOk=passGates>=4&&er5>0.35&&sig!=="WAIT";
  const isBull=sig==="CALL";
  const atr5=i5m.atr;

  const t2=isBull?p2p(price,0.009):p2p(price,-0.009);

  const putP=flow.filter(f=>f.cp==="PUT").reduce((s,f)=>s+f.prem,0);

  const flowBull=callP/tot;
  const flowLC=flowBull>0.6?U:flowBull<0.4?D:A;
  const flowLbl=flowBull>0.6?"Call dominant":flowBull<0.4?"Put dominant":"Neutral";
  const chain=genChain(price);
  const expDate=(()=>{const d=new Date();d.setDate(d.getDate()+2);return d.toLocaleDateString("en-US",{month:"numeric",day:"numeric"});})();
  const now=new Date(),ct=new Date(now.toLocaleString("en-US",{timeZone:"America/Chicago"}));
  const ctH=ct.getHours()+ct.getMinutes()/60;
  const inWin=ctH>=9.75&&ctH<=10.5,pastCut=ctH>10.5;
  const ctStr=ct.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",timeZone:"America/Chicago"});

  const vixLbl=vix>=32?"HIGH RISK — size down":vix>=25?"ELEVATED — reduce size":"NORMAL";
  const TFS=[
    {tf:"1H", i:i1h, role:"Context", desc:"Big picture"},
    {tf:"30m",i:i30m,role:"Context", desc:"Structure"},
    {tf:"15m",i:i15m,role:"Filter",  desc:"Direction"},
    {tf:"5m", i:i5m, role:"Setup",   desc:"KAMA main"},
    {tf:"3m", i:i3m, role:"Trigger", desc:"Confirm"},
    {tf:"1m", i:i1m, role:"Trigger", desc:"Timing"},
  ];
  return{sig,sigC,bullPct,passingTFs,gates,passGates,entryOk,er5,isBull,t1,t2,stop,above,below,callP,putP,flowBull,flowLC,flowLbl,chain,expDate,inWin,pastCut,ctStr,vixC,vixLbl,TFS,i1m,i3m,i5m,i15m,i30m,i1h};
}
